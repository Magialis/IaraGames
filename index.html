<!DOCTYPE html>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./assets/css/style.css">

<body>
    <header>
        <div class="menu">
            <h1 class="menu-logo">
                <a href="">
                    <img src="./assets/images/logo.png" alt="Iara Games">
                </a>
            </h1>
            <nav class="menu-content">
                <ul class="menu-content-center">
                    <li>
                        <a class="menu-content-center-link is-active" href="">
